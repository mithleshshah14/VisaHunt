<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Globe -->
  <circle cx="24" cy="24" r="20" stroke="#0ea5e9" stroke-width="2" fill="#0a0f1e"/>
  <!-- Latitude lines -->
  <ellipse cx="24" cy="24" rx="20" ry="8" stroke="#0ea5e9" stroke-width="1.2" opacity="0.4"/>
  <ellipse cx="24" cy="24" rx="20" ry="14" stroke="#0ea5e9" stroke-width="1" opacity="0.25"/>
  <!-- Longitude lines -->
  <ellipse cx="24" cy="24" rx="8" ry="20" stroke="#0ea5e9" stroke-width="1.2" opacity="0.4"/>
  <ellipse cx="24" cy="24" rx="14" ry="20" stroke="#0ea5e9" stroke-width="1" opacity="0.25"/>
  <!-- Meridian -->
  <line x1="4" y1="24" x2="44" y2="24" stroke="#0ea5e9" stroke-width="1" opacity="0.3"/>
  <line x1="24" y1="4" x2="24" y2="44" stroke="#0ea5e9" stroke-width="1" opacity="0.3"/>
  <!-- Location pin -->
  <g transform="translate(20, 10)">
    <path d="M8 0C4.686 0 2 2.686 2 6c0 5.25 6 11 6 11s6-5.75 6-11c0-3.314-2.686-6-6-6z" fill="#06b6d4" stroke="#0a0f1e" stroke-width="1"/>
