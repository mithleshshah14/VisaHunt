  </g>
  <!-- Plane silhouette -->
  <g transform="translate(6, 28) rotate(-15)">
    <path d="M0 4L6 2.5L12 0L14 2L10 4L14 6L16 5L18 6L14 8L6 6L0 4Z" fill="#f59e0b" opacity="0.9"/>
  </g>
